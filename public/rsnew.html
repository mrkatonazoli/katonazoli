document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

align-items:center;gap:10px;\">\n          <button onclick=\"{{ cancelGuests }}\" style=\"background:transparent;border:none;color:#7C7A70;border-radius:24px;padding:12px 18px;font-size:12.5px;letter-spacing:.08em;font-weight:600;cursor:pointer;\" style-hover=\"background:#F0EDE4\">MÉGSE<\u002Fbutton>\n          <button onclick=\"{{ confirmGuests }}\" style=\"background:#6E7247;color:#fff;border:none;border-radius:24px;padding:12px 28px;font-size:12.5px;letter-spacing:.08em;font-weight:600;cursor:pointer;\" style-hover=\"background:#565A36\">ALKALMAZ<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- promo code -->\n    <div style=\"max-width:560px;margin:8px auto 0;text-align:center;border-top:1px solid #ECE8DE;padding-top:24px;\">\n      <button onclick=\"{{ togglePromo }}\" style=\"display:inline-flex;align-items:center;gap:10px;background:transparent;border:1px solid #E0DCD2;border-radius:24px;padding:11px 20px;font-size:13.5px;color:#5C5A52;cursor:pointer;\" style-hover=\"border-color:#C7A86A\">\n        <span style=\"color:#8A6E35;font-size:16px;line-height:1;\">+<\u002Fspan> Promóciós kód hozzáadása\n      <\u002Fbutton>\n      <div class=\"rs-promo-input\" style=\"display:{{ promoInputDisplay }};margin-top:14px;\">\n        <div style=\"display:flex;gap:8px;justify-content:center;flex-wrap:wrap;\">\n          <input placeholder=\"Írja be a promóciós kódot\" style=\"border:1px solid #E0DCD2;border-radius:10px;padding:12px 16px;font-size:14px;width:240px;text-align:center;\">\n          <button style=\"background:#6E7247;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:12.5px;letter-spacing:.06em;font-weight:600;cursor:pointer;\">Beváltás<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- footer -->\n  <div class=\"rs-footer\" style=\"border-top:1px solid #E6E3DA;background:#FBFAF6;padding:28px;text-align:center;\">\n    <div style=\"font-size:11px;letter-spacing:.1em;color:#B5B2A8;\">POWERED BY<\u002Fdiv>\n    <div style=\"font-family:'Cormorant Garamond',serif;letter-spacing:.18em;font-size:19px;color:#8A877E;margin-top:5px;\">ROOM<span style=\"color:#B8924F;\">SOME<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentGold&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#B8924F&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  MONTHS = ['Január','Február','Március','Április','Május','Június','Július','Augusztus','Szeptember','Október','November','December'];\n  DAYS_FULL = ['vasárnap','hétfő','kedd','szerda','csütörtök','péntek','szombat'];\n  FULL = ['2026-07-03'];\n  DEPART = ['2026-06-28','2026-07-04'];\n  TODAY = '2026-06-24';\n  BASE = 2026 * 12 + 5; // June 2026\n\n  state = { arrival: '2026-06-24', departure: '2026-06-26', offset: 0, datesOpen: true, guestsOpen: false, promoChecked: false, noticeOpen: true, hoverDay: null, rooms: [{ adults: 2, children: 0, open: true }] };\n\n  pad(n) { return String(n).padStart(2, '0'); }\n  parse(ds) { const [y, m, d] = ds.split('-').map(Number); return { y, m, d }; }\n  fmtDate(ds) { const { y, m, d } = this.parse(ds); return `${y}. ${this.MONTHS[m - 1]} ${d}.`; }\n  fmtDay(ds) { const { y, m, d } = this.parse(ds); return this.DAYS_FULL[new Date(y, m - 1, d).getDay()]; }\n  nights() {\n    if (!this.state.arrival || !this.state.departure) return null;\n    return Math.round((new Date(this.state.departure) - new Date(this.state.arrival)) / 86400000);\n  }\n\n  shift(d) { this.setState(s => ({ offset: Math.max(0, s.offset + d) })); }\n  toggleSection(key) { this.setState(s => ({ [key]: !s[key] })); }\n  toggleExclusive(key) { this.setState(s => ({ datesOpen: false, guestsOpen: false, [key]: !s[key] })); }\n\n  onDay(ds) {\n    this.setState(s => {\n      if (!s.arrival || (s.arrival && s.departure)) return { arrival: ds, departure: null };\n      if (s.arrival && !s.departure) {\n        if (ds > s.arrival) return { departure: ds };\n        return { arrival: ds };\n      }\n      return {};\n    });\n  }\n\n  adjust(i, key, delta) {\n    this.setState(s => ({ rooms: s.rooms.map((r, idx) => {\n      if (idx !== i) return r;\n      const min = key === 'adults' ? 1 : 0, max = key === 'adults' ? 8 : 6;\n      return { ...r, [key]: Math.min(max, Math.max(min, r[key] + delta)) };\n    }) }));\n  }\n  toggleRoom(i) { this.setState(s => ({ rooms: s.rooms.map((r, idx) => idx === i ? { ...r, open: !r.open } : r) })); }\n  addRoom() { this.setState(s => ({ rooms: [...s.rooms.map(r => ({ ...r, open: false })), { adults: 2, children: 0, open: true }] })); }\n  removeRoom(i) { this.setState(s => s.rooms.length <= 1 ? {} : ({ rooms: s.rooms.filter((r, idx) => idx !== i) })); }\n\n  priceFor(ds) {\n    const { y, m, d } = this.parse(ds);\n    const dow = new Date(y, m - 1, d).getDay(); // 0 Sun .. 6 Sat\n    let base = 168;\n    if (dow === 5 || dow === 6) base = 189;      // péntek / szombat\n    else if (dow === 0 || dow === 4) base = 182; // vasárnap / csütörtök\n    if (m === 8) base += 14;                      // augusztusi főszezon\n    return base;\n  }\n\n  makeCell(dnum, ds, f) {\n    const G = '#6E7247', GD = '#565A36', GT = '#E7E9D8';\n    let bg = 'transparent', color = '#3A3A36', cursor = 'pointer', weight = '400', radius = '8px', priceColor = '#A8A496';\n    const clickable = !f.past && !f.full;\n    if (f.past) { color = '#CBC8BE'; cursor = 'default'; }\n    if (f.full) { color = '#B7B4AA'; cursor = 'not-allowed'; bg = '#ECEAE3'; }\n    if (f.inRange || f.previewRange) { bg = GT; color = GD; radius = '0'; priceColor = '#7E8358'; }\n    if (f.lightHover) { bg = '#EFF0E6'; }\n    if (f.previewEnd) { bg = '#DDE0CB'; color = GD; weight = '600'; radius = '10px'; priceColor = '#6E7247'; }\n    if (f.start || f.end) { bg = G; color = '#fff'; weight = '600'; radius = '10px'; priceColor = 'rgba(255,255,255,.8)'; }\n    const style = { position: 'relative', minHeight: '50px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '2px', fontFamily: \"'Jost',sans-serif\", borderRadius: radius, color, background: bg, cursor, userSelect: 'none', transition: 'background .15s', padding: '5px 0' };\n    const kids = [React.createElement('span', { key: 'n', style: { fontSize: '13.5px', fontWeight: weight, lineHeight: 1 } }, dnum)];\n    if (clickable) kids.push(React.createElement('span', { key: 'p', style: { fontSize: '10.5px', fontWeight: 400, lineHeight: 1, color: priceColor } }, f.price));\n    if (f.departonly && !f.start && !f.end) kids.push(React.createElement('div', { key: 't', style: { position: 'absolute', top: 0, right: 0, width: 0, height: 0, borderTop: '8px solid #C9CBB2', borderLeft: '8px solid transparent' } }));\n    if (f.full) kids.push(React.createElement('div', { key: 'l', style: { position: 'absolute', left: '20%', right: '20%', top: '50%', height: '1px', background: '#B7B4AA' } }));\n    if (f.bubble) kids.push(React.createElement('div', { key: 'b', style: { position: 'absolute', bottom: 'calc(100% + 7px)', left: '50%', transform: 'translateX(-50%)', background: '#565A36', color: '#fff', fontSize: '11px', fontWeight: '600', letterSpacing: '.02em', padding: '5px 11px', borderRadius: '9px', whiteSpace: 'nowrap', boxShadow: '0 6px 18px rgba(40,42,20,.3)', pointerEvents: 'none', zIndex: 20 } }, [f.bubble, React.createElement('div', { key: 'a', style: { position: 'absolute', top: '100%', left: '50%', transform: 'translateX(-50%)', width: 0, height: 0, borderLeft: '5px solid transparent', borderRight: '5px solid transparent', borderTop: '5px solid #565A36' } })]));\n    const handlers = clickable ? {\n      onClick: () => this.onDay(ds),\n      onMouseOver: () => { if (this.state.hoverDay !== ds) this.setState({ hoverDay: ds }); },\n      onMouseOut: () => this.setState(s => s.hoverDay === ds ? { hoverDay: null } : null),\n    } : {};\n    return React.createElement('div', { key: ds, style, ...handlers }, kids);\n  }\n\n  makeMonth(idx) {\n    const y = Math.floor(idx / 12), m = idx % 12;\n    const off = (new Date(y, m, 1).getDay() + 6) % 7;\n    const dim = new Date(y, m + 1, 0).getDate();\n    const st = this.state;\n    const hov = (st.arrival && !st.departure && st.hoverDay && st.hoverDay > st.arrival) ? st.hoverDay : null;\n    const slots = Math.ceil((off + dim) / 7) * 7;\n    const cells = [];\n    for (let s = 0; s < slots; s++) {\n      const dnum = s - off + 1;\n      if (dnum < 1 || dnum > dim) { cells.push(React.createElement('div', { key: 'e' + s })); continue; }\n      const ds = `${y}-${this.pad(m + 1)}-${this.pad(dnum)}`;\n      cells.push(this.makeCell(dnum, ds, {\n        past: ds < this.TODAY,\n        full: this.FULL.includes(ds),\n        departonly: this.DEPART.includes(ds),\n        start: ds === st.arrival,\n        end: ds === st.departure,\n        inRange: st.arrival && st.departure && ds > st.arrival && ds < st.departure,\n        previewRange: hov && ds > st.arrival && ds < hov,\n        previewEnd: hov && ds === hov,\n        lightHover: st.hoverDay === ds && !hov && !(ds === st.arrival || ds === st.departure) && !(st.arrival && st.departure && ds > st.arrival && ds < st.departure),\n        bubble: (hov && ds === hov) ? `${Math.round((new Date(hov) - new Date(st.arrival)) / 86400000)} éjszaka` : null,\n        price: this.priceFor(ds),\n      }));\n    }\n    return { label: `${y}. ${this.MONTHS[m]}`, cells };\n  }\n\n  renderVals() {\n    const st = this.state;\n    const m1 = this.makeMonth(this.BASE + st.offset);\n    const m2 = this.makeMonth(this.BASE + st.offset + 1);\n    const n = this.nights();\n    const tot = st.rooms.reduce((a, r) => ({ ad: a.ad + r.adults, ch: a.ch + r.children }), { ad: 0, ch: 0 });\n    const rooms = st.rooms.map((r, i) => ({\n      idx: i + 1, adults: r.adults, children: r.children,\n      summary: `${r.adults} felnőtt${r.children ? ` · ${r.children} gyerek` : ''}`,\n      bodyDisplay: r.open ? 'block' : 'none',\n      chevron: r.open ? '90deg' : '0deg',\n      removable: st.rooms.length > 1,\n      toggle: () => this.toggleRoom(i),\n      remove: () => this.removeRoom(i),\n      incA: () => this.adjust(i, 'adults', 1),\n      decA: () => this.adjust(i, 'adults', -1),\n      incC: () => this.adjust(i, 'children', 1),\n      decC: () => this.adjust(i, 'children', -1),\n    }));\n    const arrivalDate = st.arrival ? this.fmtDate(st.arrival) : '—';\n    const departDate = st.departure ? this.fmtDate(st.departure) : '—';\n    return {\n      month1Label: m1.label, month2Label: m2.label, cells1: m1.cells, cells2: m2.cells,\n      rangeLabel: st.departure ? `${arrivalDate} → ${departDate}` : `${arrivalDate} → …`,\n      calHeader: (st.arrival && !st.departure) ? 'Válassza ki a távozás dátumát' : 'Válassza ki az érkezés dátumát',\n      guestsSummary: `${tot.ad} felnőtt · ${tot.ch} gyerek · ${st.rooms.length} szoba`,\n      rooms,\n      guestsBodyDisplay: st.guestsOpen ? 'block' : 'none',\n      guestsSegBg: st.guestsOpen ? '#F6F5EF' : '#fff',\n      datesBodyDisplay: st.datesOpen ? 'block' : 'none',\n      datesSegBg: st.datesOpen ? '#F6F5EF' : '#fff',\n      promoInputDisplay: st.promoChecked ? 'block' : 'none',\n      noticeDisplay: st.noticeOpen ? 'block' : 'none',\n      confirmDatesDisplay: (st.arrival && st.departure) ? 'flex' : 'none',\n      nightsLabel: n != null ? `${n} éjszaka kiválasztva` : '',\n      confirmDates: () => this.setState({ datesOpen: false, guestsOpen: true }),\n      cancelDates: () => this.setState({ datesOpen: false }),\n      applyDates: () => this.setState({ datesOpen: false, guestsOpen: true }),\n      confirmGuests: () => this.setState({ guestsOpen: false }),\n      cancelGuests: () => this.setState({ guestsOpen: false }),\n      barMarginTop: st.noticeOpen ? '14px' : '-42px',\n      dismissNotice: () => this.setState({ noticeOpen: false }),\n      prevOpacity: st.offset <= 0 ? 0.35 : 1,\n      gold: this.props.accentGold || '#B8924F',\n      onPrev: () => this.shift(-1),\n      onNext: () => this.shift(1),\n      onAddRoom: () => this.addRoom(),\n      toggleGuests: () => this.toggleExclusive('guestsOpen'),\n      toggleDates: () => this.toggleExclusive('datesOpen'),\n      togglePromo: () => this.toggleSection('promoChecked'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
